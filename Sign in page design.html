    const p=document.getElementById('pill-'+k);if(!p)return;
    const act=k===theme;
    p.style.cssText=`padding:5px 13px;border-radius:20px;border:${act?'none':'1px solid var(--color-border-tertiary)'};background:${act?T[k].pill:'transparent'};color:${act?T[k].pt:'var(--color-text-secondary)'};font-size:11px;font-weight:${act?'600':'400'};cursor:pointer;`;
  });
}

function setTheme(t){theme=t;render();}
function setLang(l){lang=l;render();}
function toggleLang(){setLang(lang==='ar'?'en':'ar');}

const pd=document.getElementById('pills');
Object.entries(T).forEach(([k,v])=>{
  const b=document.createElement('button');
  b.id='pill-'+k;b.textContent=v.label;b.onclick=()=>setTheme(k);pd.appendChild(b);
});
render();
</script>
