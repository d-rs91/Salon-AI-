.art-headline{font-size:20px;font-weight:600;line-height:1.35;margin-bottom:7px;}
.art-sub{font-size:11px;line-height:1.65;opacity:0.55;}
.login-panel{width:310px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 30px;position:relative;}
.lang-btn{position:absolute;top:14px;font-size:10px;font-weight:600;padding:4px 13px;border-radius:20px;cursor:pointer;z-index:10;border:1px solid;}

.form-title{font-size:16px;font-weight:600;margin-bottom:3px;text-align:center;}
.form-sub{font-size:11px;text-align:center;opacity:0.5;margin-bottom:22px;}

.finput-wrap{position:relative;width:100%;}

/* ── BEAUTY ELEMENTS — reusable SVG snippet builders ───────────── */
function scissors(x,y,rot,color,op){
  return `<g transform="translate(${x},${y}) rotate(${rot})" opacity="${op}" stroke="${color}" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="-11" cy="-9" rx="9" ry="11"/>
    <ellipse cx="11" cy="-9" rx="9" ry="11"/>
    <line x1="-3" y1="1" x2="18" y2="36"/>
    <line x1="3" y1="1" x2="-18" y2="36"/>
    <circle cx="0" cy="18" r="2.2" fill="${color}" stroke="none"/>
  </g>`;
}
function comb(x,y,rot,color,op){
  const teeth=[];
  for(let i=0;i<9;i++) teeth.push(`<line x1="${5+i*5}" y1="7" x2="${5+i*5}" y2="20" stroke="${color}" stroke-width="0.8"/>`);
  return `<g transform="translate(${x},${y}) rotate(${rot})" opacity="${op}" stroke="${color}" fill="none" stroke-linecap="round">
    <rect x="0" y="0" width="48" height="8" rx="3" stroke-width="0.9"/>
    ${teeth.join('')}
  </g>`;
}
function lipstick(x,y,rot,color,op){
  return `<g transform="translate(${x},${y}) rotate(${rot})" opacity="${op}" stroke="${color}" stroke-width="0.9" fill="none" stroke-linecap="round">
    <rect x="-7" y="8" width="14" height="26" rx="2"/>
    <rect x="-9" y="-2" width="18" height="12" rx="3"/>
    <rect x="-5" y="-16" width="10" height="16" rx="1.5"/>
    <path d="M-5,-16 Q0,-22 5,-16" stroke-width="1"/>
  </g>`;
}
function nailpolish(x,y,rot,color,op){
  return `<g transform="translate(${x},${y}) rotate(${rot})" opacity="${op}" stroke="${color}" stroke-width="0.9" fill="none" stroke-linecap="round">
    <ellipse cx="0" cy="16" rx="11" ry="14"/>
    <rect x="-4" y="-4" width="8" height="8" rx="1"/>
    <rect x="-7" y="-13" width="14" height="11" rx="2"/>
  </g>`;
}
function mirror(x,y,rot,color,op){
  return `<g transform="translate(${x},${y}) rotate(${rot})" opacity="${op}" stroke="${color}" stroke-width="0.9" fill="none" stroke-linecap="round">
    <circle cx="0" cy="0" r="17"/>
    <circle cx="0" cy="0" r="13"/>
    <rect x="-5" y="17" width="10" height="20" rx="4"/>
  </g>`;
}
function hairwave(x,y,color,op){
  return `<path d="M${x} ${y} C${x+10} ${y-10} ${x+20} ${y+10} ${x+30} ${y} S${x+50} ${y-10} ${x+60} ${y}" stroke="${color}" stroke-width="1" fill="none" opacity="${op}" stroke-linecap="round"/>`;
}
function brush(x,y,rot,color,op){
  return `<g transform="translate(${x},${y}) rotate(${rot})" opacity="${op}" stroke="${color}" stroke-width="0.9" fill="none" stroke-linecap="round">
    <rect x="-3" y="-30" width="6" height="32" rx="1.5"/>
    <ellipse cx="0" cy="10" rx="6" ry="12"/>
    <line x1="0" y1="-30" x2="0" y2="-38"/>
  </g>`;
}

let theme='gold',lang='ar';

function render(){
  const C=THEMES[theme],cp=C[lang],isAr=lang==='ar';
  const af=isAr?"font-family:'Noto Kufi Arabic','Arabic UI','Arial',sans-serif;":"";
  const cyMono=theme==='cyber'?"font-family:'Courier New',monospace;":"";
  document.getElementById('shell').style.background=C.shellBg;
  document.getElementById('shell').style.flexDirection=isAr?'row':'row-reverse';
  const deco=document.getElementById('deco');
  deco.style.background=C.decoBg;
  deco.innerHTML=C.decoSvg+`<div class="art-content" style="position:relative;z-index:3;${isAr?'direction:rtl;text-align:right;':''}">
    <div class="art-badge" style="background:${C.badgeBg};color:${C.badgeColor};border:1px solid ${C.badgeBorder};${af}${cyMono}">
      <span class="pulse" style="background:${C.badgeColor}"></span>${cp.badge}</div>
    <div class="art-headline" style="color:${C.headlineColor};${af}${cyMono}">${cp.headline.replace('\n','<br>')}</div>
    <div class="art-sub" style="color:${C.subColor};${af}${cyMono}">${cp.sub.replace('\n','<br>')}</div>
  </div>`;
  const lp=document.getElementById('login');
  lp.style.background=C.formBg;
  lp.style.borderLeft=isAr?`1px solid ${C.formBorder}`:'none';
  lp.style.borderRight=isAr?'none':`1px solid ${C.formBorder}`;
  lp.style.direction=isAr?'rtl':'ltr';
  const pill=document.getElementById('lang-pill');
  pill.textContent=isAr?'English':'العربية';
  pill.style.cssText=`position:absolute;top:14px;${isAr?'left':'right'}:14px;font-size:10px;font-weight:600;padding:4px 13px;border-radius:20px;cursor:pointer;z-index:10;border:1px solid ${C.langBorder};background:${C.langBg};color:${C.langColor};`;
  const logo=document.getElementById('s-logo');
  if(theme==='gold') logo.style.cssText=`width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;font-size:20px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);color:#C9A84C;flex-shrink:0;`;
  else if(theme==='rose') logo.style.cssText=`width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;font-size:20px;background:linear-gradient(135deg,#F4A7C0,#D4776A);color:white;flex-shrink:0;`;
  else if(theme==='arctic') logo.style.cssText=`width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;font-size:20px;background:#EFF6FF;border:1px solid #BFDBFE;color:#2563EB;flex-shrink:0;`;
  else logo.style.cssText=`width:50px;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;font-size:20px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.25);color:#00D4FF;flex-shrink:0;${cyMono}font-weight:700;`;
  logo.textContent=cp.logoSymbol;
  document.getElementById('s-title').textContent=cp.title;
  document.getElementById('s-title').style.cssText=`font-size:16px;font-weight:600;margin-bottom:3px;text-align:center;color:${C.titleColor};${af}${cyMono}${theme==='cyber'?'font-size:13px;letter-spacing:1.5px;text-transform:uppercase;':''}`;
  document.getElementById('s-sub').textContent=cp.titleSub;
  document.getElementById('s-sub').style.cssText=`font-size:11px;text-align:center;opacity:0.5;margin-bottom:22px;color:${C.titleColor};${af}${cyMono}`;
  const iconSide=isAr?'right':'left';
  const padStyle=isAr?'padding:0 36px 0 12px;text-align:right;':'padding:0 12px 0 36px;';
  ['email','pass'].forEach(t=>{
    const lbl=document.getElementById('l-'+t);
    const icon=document.getElementById('i-'+t);
    const inp=document.getElementById('inp-'+t);
    lbl.textContent=t==='email'?cp.email:cp.pass;
    lbl.style.cssText=`font-size:10px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;opacity:0.55;display:block;margin-bottom:5px;color:${C.titleColor};${af}${cyMono}`;
    icon.style.cssText=`position:absolute;${iconSide}:11px;top:50%;transform:translateY(-50%);font-size:16px;color:${C.iconColor};pointer-events:none;`;
    inp.placeholder=t==='email'?(isAr?'أنتِ@صالون.sa':'you@salon.sa'):'••••••••';
    inp.style.cssText=`width:100%;height:40px;border-radius:${theme==='cyber'?'5':'9'}px;border:1.5px solid ${C.inputBorder};color:${C.inputColor};background:${C.inputBg};outline:none;${padStyle}font-size:12px;transition:border-color 0.2s,box-shadow 0.2s;${af}${cyMono}`;
    inp.onfocus=()=>{inp.style.borderColor=C.inputFocus;inp.style.boxShadow=`0 0 0 3px ${C.inputFocus}28`;};
    inp.onblur=()=>{inp.style.borderColor=C.inputBorder;inp.style.boxShadow='none';};
  });
  const frow=document.getElementById('f-row');
  frow.style.flexDirection=isAr?'row-reverse':'row';
  const chk=document.getElementById('f-chk');
  chk.style.cssText=`width:16px;height:16px;border-radius:${theme==='cyber'?'3':'4'}px;border:1.5px solid ${C.chkBorder};background:${C.chkBg};display:flex;align-items:center;justify-content:center;flex-shrink:0;`;
  chk.querySelector('i').style.color=C.chkIcon;
  document.getElementById('l-rem').textContent=cp.rem;
  document.getElementById('l-rem').style.cssText=`font-size:10px;opacity:0.55;color:${C.titleColor};${af}${cyMono}`;
  document.getElementById('l-forgot').textContent=cp.forgot;
  document.getElementById('l-forgot').style.cssText=`font-size:10px;font-weight:600;cursor:pointer;color:${C.accent};${af}${cyMono}`;
  const btn=document.getElementById('f-btn');
  btn.textContent=cp.btn;
  let bs=`width:100%;height:40px;border-radius:${theme==='cyber'?'5':'9'}px;font-size:13px;font-weight:600;cursor:pointer;transition:transform 0.15s,opacity 0.15s;margin-bottom:10px;${af}`;
  if(theme==='cyber') bs+=`border:1px solid rgba(0,212,255,0.4);background:transparent;color:#00D4FF;${cyMono}font-size:11px;letter-spacing:2px;text-transform:uppercase;`;
  else bs+=`border:none;background:${C.accent};color:${C.accentText};`;
  btn.style.cssText=bs;
  document.getElementById('f-foot').textContent=cp.foot;
  document.getElementById('f-foot').style.cssText=`font-size:10px;text-align:center;color:${C.footColor};${af}${cyMono}${theme==='cyber'?'font-size:9px;letter-spacing:0.8px;':''}`;
  const dAr=lang==='ar',dEn=lang==='en';
  document.getElementById('btn-ar').style.cssText=`padding:5px 13px;border-radius:20px;border:1px solid var(--color-border-tertiary);background:${dAr?'var(--color-text-primary)':'transparent'};color:${dAr?'var(--color-background-primary)':'var(--color-text-secondary)'};font-size:11px;cursor:pointer;`;
  document.getElementById('btn-en').style.cssText=`padding:5px 13px;border-radius:20px;border:1px solid var(--color-border-tertiary);background:${dEn?'var(--color-text-primary)':'transparent'};color:${dEn?'var(--color-background-primary)':'var(--color-text-secondary)'};font-size:11px;cursor:pointer;`;
}

function setTheme(t){
  theme=t;
  document.querySelectorAll('.tpill').forEach(p=>p.style.cssText=`padding:5px 13px;border-radius:20px;border:1px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);font-size:11px;font-weight:500;cursor:pointer;`);
  const a=document.getElementById('pill-'+t);
  if(a) a.style.cssText=`padding:5px 13px;border-radius:20px;border:none;background:${THEMES[t].pill};color:${THEMES[t].pillText};font-size:11px;font-weight:600;cursor:pointer;`;
  render();
}
function setLang(l){lang=l;render();}
function toggleLang(){setLang(lang==='ar'?'en':'ar');}

const pd=document.getElementById('pills');
Object.entries(THEMES).forEach(([k,v])=>{
  const b=document.createElement('button');
  b.className='tpill';b.id='pill-'+k;b.textContent=v.label;
  b.onclick=()=>setTheme(k);pd.appendChild(b);
});
setTheme('gold');setLang('ar');
</script>
